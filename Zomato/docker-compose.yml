version: '3.8'

services:

  # PostgreSQL 16 — Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: zomato_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zomato_db
      POSTGRES_USER: zomato_user
      POSTGRES_PASSWORD: zomato_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zomato_user -d zomato_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 — Cache + Sessions + Message Broker
  redis:
    image: redis:7-alpine
    container_name: zomato_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — PostgreSQL Web UI (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zomato_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zomato.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # Redis Commander — Redis Web UI (http://localhost:8081)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: zomato_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_pass
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local