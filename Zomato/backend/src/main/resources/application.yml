spring:
  application:
    name: zomato-backend
  profiles:
    active: dev

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Kolkata

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: redis

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 90000000
  refresh-token-expiry: 604800000

springdoc:
  swagger-ui: 
    path: /swagger-ui.html

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}