spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/zomato_db
    username: zomato_user
    password: zomato_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

jpa:
  show-sql: true

data:
  redis:
    host: localhost
    port: 6379
    password: redis_pass
 
logging:
  level:
    com.zomato: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG